name: AcuGuide
# Reproducible project generation — run `xcodegen generate` (or `make`) to (re)create
# AcuGuide.xcodeproj from this spec. No more hand-assembling the project in Xcode.
options:
  bundleIdPrefix: app.acuguide
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Device build is signed by the developer's team; CLI `generic/platform=iOS`
    # builds with signing disabled so CI / `xcodebuild` works without a team.
    CODE_SIGN_STYLE: Automatic

packages:
  # Loads MaiApp/model.glb at runtime (no usdz conversion) — same asset as the web app.
  # Binary xcframework, pinned for reproducibility.
  GLTFKit2:
    url: https://github.com/warrenm/GLTFKit2
    revision: be89e833aa85bde67bd27d4ecff3b7816c58ce56

targets:
  AcuGuide:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: AcuGuide
    dependencies:
      - package: GLTFKit2
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.acuguide.ios
        GENERATE_INFOPLIST_FILE: YES
        # Camera usage string (forced safety gate runs before this is ever needed).
        INFOPLIST_KEY_NSCameraUsageDescription: "AcuGuide uses the camera to guide your acupressure press."
        # Portrait-locked: the overlay coordinate mapping is derived for portrait, and
        # the Vision orientation is still computed from the capture connection (not assumed).
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"

  AcuGuideTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: AcuGuideTests
      # Ground-truth replay fixtures, referenced READ-ONLY from the repo (not copied/modified)
      # and bundled into the test target so CoachStateMachine can be driven frame-by-frame.
      - path: ../../claude-deliverables/fixtures/fixture_1_te3_correct_good_rhythm.json
        buildPhase: resources
      - path: ../../claude-deliverables/fixtures/fixture_2_te3_wrong_position.json
        buildPhase: resources
      - path: ../../claude-deliverables/fixtures/fixture_3_pc6_correct_too_fast.json
        buildPhase: resources
      - path: ../../claude-deliverables/fixtures/fixture_4_no_hand_then_partial.json
        buildPhase: resources
      - path: ../../claude-deliverables/fixtures/fixture_5_te3_full_flow.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.acuguide.ios.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: AcuGuide

schemes:
  AcuGuide:
    build:
      targets:
        AcuGuide: all
        AcuGuideTests: [test]
    test:
      targets:
        - AcuGuideTests
